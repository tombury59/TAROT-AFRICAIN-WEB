<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tarot Africain</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════════ */
    :root {
      --felt: #0d3b1e;
      --felt-light: #145228;
      --felt-rim: #0a2e17;
      --gold: #c9a84c;
      --gold-light: #f0d07a;
      --gold-dark: #7a5e1a;
      --gold-glow: rgba(201, 168, 76, .35);
      --cream: #f5ead5;
      --cream-dim: rgba(245, 234, 213, .65);
      --red: #c0392b;
      --blue: #1a5fa8;
      --bg: #060e08;
      --table-shadow: 0 0 120px rgba(0, 0, 0, .9), 0 0 40px rgba(0, 0, 0, .7);
      --card-w: 110px;
      --card-h: 165px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: radial-gradient(ellipse at 50% 0%, #1a3a20 0%, #080f09 55%, #030703 100%);
      color: var(--cream);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════ */
    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* ═══════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════ */
    #home {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 50% 10%, rgba(201, 168, 76, .08) 0%, transparent 70%),
        radial-gradient(ellipse at 50% 100%, rgba(13, 59, 30, .8) 0%, transparent 60%);
    }

    .home-deco {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201, 168, 76, .025) 60px, rgba(201, 168, 76, .025) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201, 168, 76, .025) 60px, rgba(201, 168, 76, .025) 61px);
      pointer-events: none;
    }

    .home-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .brand-main {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 8vw, 4rem);
      letter-spacing: 6px;
      color: var(--gold);
      text-shadow: 0 0 60px rgba(201, 168, 76, .5), 0 2px 0 rgba(0, 0, 0, .5);
      line-height: 1;
    }

    .brand-sub {
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      letter-spacing: 5px;
      color: var(--cream-dim);
      margin-top: .5rem;
      font-weight: 400;
    }

    .brand-ornament {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin: .7rem 0 1.2rem;
    }

    .orn-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
    }

    .orn-star {
      color: var(--gold);
      font-size: .85rem;
    }

    /* Panel */
    .panel {
      background: rgba(0, 0, 0, .55);
      border: 1px solid rgba(201, 168, 76, .2);
      border-radius: 18px;
      padding: 1.8rem;
      width: 100%;
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(201, 168, 76, .12);
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      opacity: .8;
    }

    .inp {
      width: 100%;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(201, 168, 76, .18);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1.05rem;
      padding: .65rem 1rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
      margin-bottom: .85rem;
    }

    .inp:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, .09);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, .12);
    }

    .inp::placeholder {
      color: rgba(245, 234, 213, .25);
    }

    /* Color picker */
    .color-label {
      font-size: .75rem;
      color: var(--cream-dim);
      margin-bottom: .5rem;
      opacity: .7;
      letter-spacing: 1px;
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform .18s, border-color .18s, box-shadow .18s;
      position: relative;
    }

    .color-swatch.picked {
      transform: scale(1.2);
      border-color: white;
      box-shadow: 0 0 10px rgba(255, 255, 255, .3);
    }

    .color-swatch.taken {
      opacity: .2;
      cursor: not-allowed;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: .8rem 1rem;
      border-radius: 11px;
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all .2s;
      border: none;
      text-transform: uppercase;
      margin-bottom: .6rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7a5e1a 0%, #c9a84c 50%, #f0d07a 100%);
      color: #1a1005;
      font-weight: 900;
      box-shadow: 0 4px 20px rgba(201, 168, 76, .3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201, 168, 76, .45);
      filter: brightness(1.08);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(201, 168, 76, .28);
      color: var(--gold-light);
      font-weight: 600;
    }

    .btn-ghost:hover {
      background: rgba(201, 168, 76, .08);
      border-color: var(--gold);
    }

    .btn-danger {
      background: linear-gradient(135deg, #7a1010, #c0392b);
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(192, 57, 43, .3);
    }

    .sep {
      text-align: center;
      color: var(--cream-dim);
      opacity: .35;
      font-size: .8rem;
      margin: .3rem 0 .9rem;
      letter-spacing: 2px;
    }

    /* ═══════════════════════════════════════════════
   LOBBY SCREEN
═══════════════════════════════════════════════ */
    #lobby {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 20%, rgba(201, 168, 76, .05) 0%, transparent 60%);
    }

    .lobby-inner {
      width: 100%;
      max-width: 440px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .lobby-code-wrap {
      text-align: center;
    }

    .lobby-code-label {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: 3px;
      color: var(--gold);
      opacity: .65;
    }

    .lobby-code {
      font-family: 'Courier New', monospace;
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 10px;
      text-shadow: 0 0 30px rgba(201, 168, 76, .4);
      line-height: 1.1;
    }

    .lobby-code-hint {
      font-size: .72rem;
      color: var(--cream-dim);
      opacity: .45;
    }

    .lobby-players-list {
      width: 100%;
    }

    .lobby-player {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: .7rem 1rem;
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(255, 255, 255, .05);
      border-radius: 10px;
      margin-bottom: 6px;
      transition: background .2s;
      animation: slideIn .3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lp-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: .95rem;
      color: white;
      flex-shrink: 0;
      text-shadow: 0 1px 3px rgba(0, 0, 0, .5);
    }

    .lp-name {
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
    }

    .lp-badge {
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      letter-spacing: 1.5px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(201, 168, 76, .15);
      border: 1px solid rgba(201, 168, 76, .3);
      color: var(--gold);
    }

    .lp-dc {
      opacity: .35;
      font-style: italic;
    }

    /* ═══════════════════════════════════════════════
   GAME SCREEN — TABLE
═══════════════════════════════════════════════ */
    #game {
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .table-felt {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 50% 55%, var(--felt-light) 0%, var(--felt) 40%, var(--felt-rim) 70%, #050d07 100%);
      overflow: hidden;
    }

    .table-felt::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3L3 1' stroke='rgba(255,255,255,0.025)' stroke-width='.5'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .table-rim {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 660px);
      height: min(72vh, 520px);
      border-radius: 50%;
      border: 8px solid rgba(201, 168, 76, .18);
      box-shadow: inset 0 0 60px rgba(0, 0, 0, .4), 0 0 0 4px rgba(201, 168, 76, .07), 0 0 80px rgba(0, 0, 0, .8);
      pointer-events: none;
    }

    .table-rim::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, .08);
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .5rem 1.2rem;
      background: rgba(0, 0, 0, .55);
      border-bottom: 1px solid rgba(201, 168, 76, .12);
      pointer-events: all;
      flex-shrink: 0;
      z-index: 20;
    }

    .top-bar-title {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: 3px;
      color: var(--gold);
      font-weight: 600;
    }

    .top-bar-info {
      font-size: .72rem;
      color: var(--cream-dim);
      font-style: italic;
    }

    .table-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      pointer-events: none;
    }

    /* ── Players around the table ── */
    .player-seat {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: all;
      transition: all .4s cubic-bezier(.34, 1.56, .64, 1);
    }

    .seat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, .15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1rem;
      color: white;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .6);
      transition: border-color .3s, box-shadow .3s, transform .3s;
      position: relative;
      flex-shrink: 0;
    }

    .seat-avatar.active-turn {
      border-color: var(--gold-light);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, .35), 0 0 20px rgba(201, 168, 76, .4);
      transform: scale(1.1);
    }

    .seat-avatar.dealer::after {
      content: 'D';
      position: absolute;
      top: -6px;
      right: -6px;
      width: 17px;
      height: 17px;
      background: var(--gold);
      color: #1a1005;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 900;
      font-family: 'Cinzel', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .seat-name {
      font-size: .68rem;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: .5px;
      margin-top: 4px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .9);
      white-space: nowrap;
    }

    .seat-lives {
      display: flex;
      gap: 2px;
      margin-top: 3px;
      flex-wrap: wrap;
      max-width: 64px;
      justify-content: center;
    }

    .life-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transition: opacity .3s, transform .3s;
    }

    .life-pip.lost {
      opacity: .12;
      transform: scale(.7);
    }

    .seat-ann {
      font-size: .62rem;
      color: var(--gold-light);
      font-style: italic;
      margin-top: 2px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .9);
    }

    /* ── Other players' hand (face-down) ── */
    .seat-hand-back {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .mini-card-back {
      width: 22px;
      height: 33px;
      border-radius: 3px;
      background: #1a2e6e url('/cards/dos.jpg') center/cover no-repeat;
      border: 1.5px solid rgba(201, 168, 76, .4);
      margin: 0 -5px;
      box-shadow: 1px 1px 4px rgba(0, 0, 0, .5);
      transition: transform .2s;
    }

    /* ── Trick zone — pile mode ── */
    .trick-zone {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 230px;
      pointer-events: none;
      z-index: 10;
    }

    .trick-card-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: dropCard .38s cubic-bezier(.22, .61, .36, 1);
    }

    @keyframes dropCard {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(.82) rotate(0deg);
      }

      to {
        opacity: 1;
      }
    }

    .trick-player-lbl {
      font-size: .6rem;
      font-family: 'Cinzel', serif;
      letter-spacing: .5px;
      opacity: .85;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .9);
    }

    /* ── Phase banner ── */
    .phase-banner {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, .75);
      border: 1px solid rgba(201, 168, 76, .22);
      border-radius: 20px;
      padding: .35rem 1.1rem;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      z-index: 15;
    }

    .phase-banner-title {
      font-family: 'Cinzel', serif;
      font-size: .68rem;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .phase-banner-sub {
      font-size: .68rem;
      color: var(--cream-dim);
      margin-top: 1px;
    }

    /* ── ONE CARD special banner ── */
    .onecard-banner {
      position: absolute;
      top: 116px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(74, 26, 110, .65);
      border: 1px solid rgba(138, 26, 200, .4);
      border-radius: 14px;
      padding: .28rem .9rem;
      font-size: .66rem;
      color: #d4a0ff;
      white-space: nowrap;
      pointer-events: none;
      z-index: 15;
      backdrop-filter: blur(4px);
      font-style: italic;
    }

    /* ═══════════════════════════════════════════════
   BOTTOM ACTION PANEL
═══════════════════════════════════════════════ */
    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      pointer-events: all;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }

    .my-hand-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      padding: 8px 0 0;
      min-height: 185px;
    }

    .my-hand-label {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: .55rem;
      letter-spacing: 2px;
      color: var(--gold);
      opacity: .6;
      white-space: nowrap;
    }

    /* ── THE CARD ── */
    .tcard {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.34, 1.56, .64, 1), box-shadow .2s;
      flex-shrink: 0;
      user-select: none;
      will-change: transform;
    }

    .tcard-face {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: linear-gradient(160deg, #fffef5 0%, #f5ead5 60%, #ede0c0 100%);
      border: 2px solid rgba(139, 105, 20, .35);
      box-shadow: 2px 4px 12px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(255, 255, 255, .6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .tcard-face::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(139, 105, 20, .2);
      border-radius: 5px;
      pointer-events: none;
    }

    .card-val {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #2a1a05;
      line-height: 1;
    }

    .card-sym {
      font-size: 1.1rem;
      margin-top: 2px;
      color: var(--gold-dark);
    }

    /* Back */
    .tcard-back .tcard-face {
      background: linear-gradient(135deg, #1a2e6e 0%, #2d1a6e 50%, #6e1a3a 100%);
      border-color: rgba(201, 168, 76, .4);
    }

    .card-back-inner {
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(201, 168, 76, .25);
      border-radius: 4px;
      background: repeating-linear-gradient(45deg, transparent, transparent 4px,
          rgba(201, 168, 76, .06) 4px, rgba(201, 168, 76, .06) 8px);
    }

    /* Playable glow */
    .tcard.playable {
      cursor: pointer;
    }

    .tcard.not-playable {
      cursor: default;
      opacity: .8;
    }

    .tcard.not-playable:hover {
      transform: none;
    }

    /* Fanned hand */
    .hand-fan {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      position: relative;
      height: 175px;
    }

    .hand-fan .tcard {
      margin: 0 -14px;
    }

    /* ── Announce panel — redesigned ── */
    .action-panel {
      width: 100%;
      max-width: 500px;
      background: rgba(0, 0, 0, .82);
      border-top: 1px solid rgba(201, 168, 76, .18);
      backdrop-filter: blur(10px);
      padding: .9rem 1.2rem 1rem;
      pointer-events: all;
    }

    /* ── Ann num buttons ── */
    .ann-num-btn {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(255, 255, 255, .07) 0%, rgba(255, 255, 255, .03) 100%);
      border: 1.5px solid rgba(201, 168, 76, .25);
      color: var(--cream);
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s cubic-bezier(.34, 1.56, .64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .06);
    }

    .ann-num-btn:hover:not(:disabled) {
      background: linear-gradient(145deg, rgba(201, 168, 76, .22) 0%, rgba(201, 168, 76, .10) 100%);
      border-color: var(--gold);
      color: var(--gold-light);
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .5), 0 0 12px rgba(201, 168, 76, .25), inset 0 1px 0 rgba(255, 255, 255, .1);
    }

    .ann-num-btn:active:not(:disabled) {
      transform: translateY(-1px) scale(1.02);
    }

    .ann-num-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
      border-color: rgba(192, 57, 43, .3);
      background: rgba(192, 57, 43, .08);
    }

    .ann-num-btn .forbid-x {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #e57373;
      opacity: .55;
    }

    /* ── Excuse panel ── */
    .excuse-panel {
      background: rgba(50, 20, 80, .85);
      border: 1px solid rgba(138, 26, 200, .5);
      border-radius: 14px;
      padding: .9rem 1.2rem;
      text-align: center;
      margin: 0 1rem .6rem;
      backdrop-filter: blur(8px);
      pointer-events: all;
    }

    .excuse-title {
      color: #d4a0ff;
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: 2px;
      margin-bottom: .7rem;
    }

    .excuse-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .excuse-choice-btn {
      flex: 1;
      max-width: 160px;
      padding: .6rem .8rem;
      border-radius: 10px;
      border: 1.5px solid rgba(201, 168, 76, .3);
      background: rgba(0, 0, 0, .4);
      color: var(--cream);
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .5px;
      cursor: pointer;
      transition: all .18s;
    }

    .excuse-choice-btn:hover {
      background: rgba(201, 168, 76, .12);
      border-color: var(--gold);
    }

    /* ── Score panel ── */
    .score-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      pointer-events: all;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .score-card {
      background: rgba(5, 15, 7, .92);
      border: 1px solid rgba(201, 168, 76, .3);
      border-radius: 20px;
      padding: 1.8rem;
      width: min(380px, 90vw);
      box-shadow: 0 32px 80px rgba(0, 0, 0, .8), inset 0 1px 0 rgba(201, 168, 76, .15);
    }

    .score-card-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .55rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
    }

    .score-row:last-of-type {
      border-bottom: none;
    }

    .s-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
      text-shadow: 0 1px 3px rgba(0, 0, 0, .5);
    }

    .s-name {
      font-size: .92rem;
      font-weight: 600;
      flex: 1;
    }

    .s-detail {
      font-size: .72rem;
      color: var(--cream-dim);
      opacity: .65;
    }

    .s-result {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .s-ok {
      color: #5ec95e;
    }

    .s-bad {
      color: #e57373;
    }

    /* ── Log ── */
    .log-strip {
      position: absolute;
      bottom: 120px;
      right: 12px;
      width: 200px;
      pointer-events: none;
      z-index: 12;
    }

    .log-line {
      font-size: .62rem;
      color: var(--cream-dim);
      opacity: .55;
      line-height: 1.8;
      text-align: right;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: logFade .4s ease;
    }

    @keyframes logFade {
      from {
        opacity: 0;
      }

      to {
        opacity: .55;
      }
    }

    /* ── Waiting message ── */
    .waiting-pill {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, .7);
      border: 1px solid rgba(201, 168, 76, .18);
      border-radius: 20px;
      padding: .35rem 1rem;
      font-size: .72rem;
      color: var(--cream-dim);
      font-style: italic;
      white-space: nowrap;
      pointer-events: none;
      z-index: 15;
    }

    /* ── Trick counter ── */
    .trick-counter {
      position: absolute;
      top: 60px;
      right: 14px;
      background: rgba(0, 0, 0, .6);
      border: 1px solid rgba(201, 168, 76, .18);
      border-radius: 10px;
      padding: .3rem .65rem;
      text-align: center;
      pointer-events: none;
      z-index: 15;
    }

    .tc-num {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .tc-label {
      font-size: .52rem;
      color: var(--cream-dim);
      opacity: .6;
      letter-spacing: 1px;
    }

    /* ═══════════════════════════════════════════════
   END SCREEN
═══════════════════════════════════════════════ */
    #endscreen {
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, rgba(201, 168, 76, .08) 0%, transparent 60%);
    }

    .end-card {
      background: rgba(0, 0, 0, .7);
      border: 1px solid rgba(201, 168, 76, .32);
      border-radius: 22px;
      padding: 2.4rem;
      width: min(400px, 90vw);
      text-align: center;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .8), inset 0 1px 0 rgba(201, 168, 76, .15);
      backdrop-filter: blur(10px);
    }

    .trophy {
      font-size: 3.5rem;
      display: block;
      margin-bottom: .3rem;
    }

    .end-title {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: 3px;
      color: var(--cream-dim);
      opacity: .6;
      margin-bottom: .3rem;
    }

    .end-winner {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 1.4rem;
    }

    /* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(10, 18, 11, .95);
      border: 1px solid rgba(201, 168, 76, .35);
      border-radius: 10px;
      padding: .55rem 1.2rem;
      color: var(--cream);
      font-size: .8rem;
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
    @media (max-width: 480px) {
      :root {
        --card-w: 82px;
        --card-h: 123px;
      }

      .hand-fan {
        height: 133px;
      }

      .my-hand-wrap {
        min-height: 143px;
      }

      .ann-num-btn {
        width: 44px;
        height: 44px;
        font-size: 1rem;
      }
    }

    @media (max-width: 360px) {
      :root {
        --card-w: 70px;
        --card-h: 105px;
      }

      .hand-fan {
        height: 115px;
      }

      .my-hand-wrap {
        min-height: 125px;
      }

      .ann-num-btn {
        width: 38px;
        height: 38px;
        font-size: .9rem;
      }
    }
  </style>
</head>

<body>

  <!-- ═══════════════ HOME ═══════════════ -->
  <div id="home" class="screen active">
    <div class="home-deco"></div>
    <div class="home-inner">
      <div class="brand">
        <div class="brand-main">TAROT<br>AFRICAIN</div>
        <div class="brand-ornament">
          <div class="orn-line"></div>
          <div class="orn-star">⚜</div>
          <div class="orn-line"></div>
        </div>
        <div class="brand-sub">Multijoueur en ligne</div>
      </div>

      <div class="panel">
        <div class="panel-title">Votre identité</div>
        <input class="inp" id="h-name" placeholder="Votre prénom" maxlength="18">
        <div class="color-label">Choisissez votre couleur</div>
        <div class="color-row" id="h-colors"></div>

        <button class="btn btn-primary" id="btn-create" onclick="createRoom()">Créer un salon</button>
        <div class="sep">— ou —</div>
        <input class="inp" id="h-code" placeholder="Code du salon (ex: A1B2C3)" maxlength="6"
          style="text-transform:uppercase">
        <button class="btn btn-ghost" id="btn-join" onclick="joinRoom()">Rejoindre le salon</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ LOBBY ═══════════════ -->
  <div id="lobby" class="screen">
    <div class="lobby-inner">
      <div class="lobby-code-wrap">
        <div class="lobby-code-label">CODE DU SALON</div>
        <div class="lobby-code" id="room-code-display">——</div>
        <div class="lobby-code-hint">Partagez ce code avec vos amis</div>
      </div>

      <div class="lobby-players-list" id="lobby-players"></div>

      <div style="width:100%;max-width:320px;">
        <div id="lobby-hint"
          style="font-size:.78rem; color:var(--cream-dim); opacity:.55; text-align:center; margin-bottom:.8rem; font-style:italic;">
        </div>
        <button class="btn btn-primary" id="btn-start" onclick="startGame()" style="display:none;">Lancer la partie
          ▶</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ GAME ═══════════════ -->
  <div id="game" class="screen">
    <div class="table-felt"></div>
    <div class="table-rim"></div>

    <div class="game-overlay">
      <div class="top-bar">
        <div class="top-bar-title">⚜ TAROT AFRICAIN</div>
        <div class="top-bar-info" id="g-round-info">—</div>
      </div>

      <div class="table-center" id="table-center">
        <div class="trick-zone" id="trick-zone"></div>
      </div>

      <div class="phase-banner" id="phase-banner" style="display:none;">
        <div class="phase-banner-title" id="phase-title"></div>
        <div class="phase-banner-sub" id="phase-sub"></div>
      </div>

      <div class="onecard-banner" id="onecard-banner" style="display:none;">
        ⚠ Manche spéciale : vous voyez les cartes des autres, pas la vôtre !
      </div>

      <div class="trick-counter" id="trick-counter" style="display:none;">
        <div class="tc-num" id="tc-num">0/0</div>
        <div class="tc-label">PLIS</div>
      </div>

      <div class="log-strip" id="log-strip"></div>
      <div class="waiting-pill" id="waiting-pill" style="display:none;"></div>
      <div id="score-overlay-wrap"></div>
      <div id="excuse-panel-wrap"></div>

      <div class="bottom-panel">
        <div id="ann-panel" class="action-panel" style="display:none;"></div>

        <div class="my-hand-wrap" id="my-hand-wrap">
          <div class="my-hand-label">VOTRE MAIN</div>
          <div class="hand-fan" id="my-hand"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ END ═══════════════ -->
  <div id="endscreen" class="screen">
    <div class="end-card">
      <span class="trophy">🏆</span>
      <div class="end-title">VAINQUEUR</div>
      <div class="end-winner" id="end-winner">—</div>
      <div style="margin-bottom:1.2rem;" id="end-scores"></div>
      <div id="end-host-btns" style="display:none;">
        <button class="btn btn-primary" onclick="restartGame()">Nouvelle partie</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════
    // Constants & State
    // ══════════════════════════════════════
    const COLORS = [
      '#c53030', '#2563eb', '#16a34a', '#ca8a04', '#7c3aed',
      '#db2777', '#0891b2', '#d97706', '#059669', '#e67e22'
    ];

    let socket, myId, myRoom, myColor = COLORS[0], myName = '';
    let lastState = null, isHost = false;

    // ══════════════════════════════════════
    // Color Picker
    // ══════════════════════════════════════
    function initColorPicker(containerId, onPick) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      COLORS.forEach((c, i) => {
        const s = document.createElement('div');
        s.className = 'color-swatch' + (i === 0 ? ' picked' : '');
        s.style.background = c;
        s.onclick = () => {
          el.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('picked'));
          s.classList.add('picked');
          onPick(c);
        };
        el.appendChild(s);
      });
    }
    initColorPicker('h-colors', c => { myColor = c; });

    // ══════════════════════════════════════
    // Socket
    // ══════════════════════════════════════
    function connectSocket() {
      socket = io();

      socket.on('joined', ({ code, playerId }) => {
        myId = playerId;
        myRoom = code;
        document.getElementById('room-code-display').textContent = code;
        showScreen('lobby');
      });

      socket.on('lobby_state', (data) => {
        isHost = (socket.id === data.hostId);
        renderLobby(data);
        if (data.started && lastState) showScreen('game');
      });

      socket.on('game_state', (gs) => {
        lastState = gs;
        if (gs.phase === 'end') {
          renderEnd(gs);
          showScreen('endscreen');
        } else {
          showScreen('game');
          renderGame(gs);
        }
      });

      socket.on('error', (msg) => toast('⚠ ' + msg));
    }

    // ══════════════════════════════════════
    // Room actions
    // ══════════════════════════════════════
    function createRoom() {
      myName = document.getElementById('h-name').value.trim() || 'Hôte';
      connectSocket();
      socket.emit('create_room', { name: myName, color: myColor });
    }
    function joinRoom() {
      const code = document.getElementById('h-code').value.trim().toUpperCase();
      if (code.length !== 6) return toast('Code invalide (6 caractères)');
      myName = document.getElementById('h-name').value.trim() || 'Joueur';
      connectSocket();
      socket.emit('join_room', { code, name: myName, color: myColor });
    }
    function startGame() { socket.emit('start_game'); }
    function restartGame() { socket.emit('restart_game'); showScreen('lobby'); }

    // ══════════════════════════════════════
    // Lobby Render
    // ══════════════════════════════════════
    function renderLobby(data) {
      document.getElementById('room-code-display').textContent = data.code;
      const el = document.getElementById('lobby-players');
      el.innerHTML = data.players.map(p => {
        const initials = p.name.substring(0, 2).toUpperCase();
        return `<div class="lobby-player${!p.ready ? ' lp-dc' : ''}">
      <div class="lp-avatar" style="background:${p.color};">${initials}</div>
      <span class="lp-name">${p.name}</span>
      ${p.id === data.hostId ? '<span class="lp-badge">HÔTE</span>' : ''}
      ${!p.ready ? '<span style="font-size:.62rem;opacity:.4;">hors ligne</span>' : ''}
    </div>`;
      }).join('');

      const n = data.players.length;
      const hint = document.getElementById('lobby-hint');
      const btn = document.getElementById('btn-start');
      if (isHost) {
        hint.textContent = n < 3 ? `En attente de joueurs… (${n}/3 minimum)` : `${n} joueur${n > 1 ? 's' : ''} — prêts à jouer !`;
        btn.style.display = 'block';
        btn.disabled = n < 3;
      } else {
        hint.textContent = `En attente que l'hôte lance la partie…`;
        btn.style.display = 'none';
      }
    }

    // ══════════════════════════════════════
    // Seat Positions
    // ══════════════════════════════════════
    function getSeatPositions(n, myIdx) {
      const positions = [];
      for (let i = 0; i < n; i++) {
        const relative = (i - myIdx + n) % n;
        let angle;
        if (n === 3) {
          const angles = [90, 210, 330];
          angle = angles[relative];
        } else if (n === 4) {
          const angles = [90, 180, 270, 0];
          angle = angles[relative];
        } else {
          const angles = [90, 162, 234, 306, 18];
          angle = angles[relative];
        }
        const rad = (angle * Math.PI) / 180;
        const rx = 41, ry = 34;
        const cx = 50, cy = 50;
        const x = cx + rx * Math.cos(rad);
        const y = cy + ry * Math.sin(rad);
        positions[i] = { left: x, top: y };
      }
      return positions;
    }

    // ══════════════════════════════════════
    // Card rendering
    // FIX: excuse uses 0.jpg (not excuse.jpg)
    // ══════════════════════════════════════
    function cardHTML(card, opts = {}) {
      const { clickable = false, clickFn = '' } = opts;

      // ── Dos de carte ──
      if (!card || card.hidden) {
        return `<div class="tcard tcard-back">
      <div class="tcard-face" style="padding:0;overflow:hidden;background:#fff;">
        <img src="/cards/dos.jpg" draggable="false"
          style="width:100%;height:100%;object-fit:cover;border-radius:6px;display:block;"
          onerror="this.style.display='none'">
      </div>
    </div>`;
      }

      // FIX: l'Excuse utilise 0.jpg
      const imgFile = card.isExcuse ? '0.jpg' : `${card.value}.jpg`;

      const evLabel = card.isExcuse && card.effectiveValue !== null && card.effectiveValue !== undefined
        ? `<div style="position:absolute;bottom:3px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:.52rem;font-weight:700;color:var(--gold);background:rgba(0,0,0,.65);padding:1px 0;">(=${card.effectiveValue})</div>`
        : '';

      return `<div class="tcard${clickable ? ' playable' : ' not-playable'}" ${clickFn ? `onclick="${clickFn}"` : ''}>
    <div class="tcard-face" style="padding:0;overflow:hidden;background:#fff;position:relative;">
      <img src="/cards/${imgFile}" draggable="false"
        style="width:100%;height:100%;object-fit:cover;border-radius:6px;display:block;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div style="display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
        <div class="card-val">${card.isExcuse ? '★' : card.value}</div>
        <div class="card-sym">⚜</div>
      </div>
      ${evLabel}
    </div>
  </div>`;
    }

    // ══════════════════════════════════════
    // Main Game Render
    // ══════════════════════════════════════
    function renderGame(gs) {
      const n = gs.players.length;
      const size = gs.roundSize;
      const me = gs.players[gs.myIdx];
      const isMyTurn = gs.myIdx === gs.currentPlayerIdx;
      const isMyAnnounceTurn = gs.phase === 'announce' && gs.myIdx === gs.announceIdx;
      const canPlay = gs.phase === 'play' && isMyTurn && !gs.excuseWaiting;

      // Top bar
      document.getElementById('g-round-info').textContent =
        `Manche ${gs.roundIdx + 1} · ${size} carte${size > 1 ? 's' : ''}`;

      // Phase banner
      const phaseBanner = document.getElementById('phase-banner');
      const activeName = gs.players[gs.currentPlayerIdx]?.name || '';
      let phaseTxt = '', phaseSub = '';
      if (gs.phase === 'announce') {
        phaseTxt = 'Annonces';
        phaseSub = isMyAnnounceTurn ? '🎯 À vous d\'annoncer !' : `En attente de ${gs.players[gs.announceIdx]?.name}…`;
      } else if (gs.phase === 'play') {
        phaseTxt = 'Phase de jeu';
        phaseSub = isMyTurn ? '🎴 À vous de jouer !' : `Au tour de ${activeName}…`;
      }
      if (phaseTxt) {
        phaseBanner.style.display = 'block';
        document.getElementById('phase-title').textContent = phaseTxt;
        document.getElementById('phase-sub').textContent = phaseSub;
      } else {
        phaseBanner.style.display = 'none';
      }

      // One-card banner
      document.getElementById('onecard-banner').style.display = gs.oneCardSpecial ? 'block' : 'none';

      // Trick counter
      if (gs.phase === 'play') {
        document.getElementById('trick-counter').style.display = 'block';
        document.getElementById('tc-num').textContent = `${gs.tricksPlayed}/${size}`;
      } else {
        document.getElementById('trick-counter').style.display = 'none';
      }

      // ── Player seats ──
      const center = document.getElementById('table-center');
      center.querySelectorAll('.player-seat').forEach(e => e.remove());

      const positions = getSeatPositions(n, gs.myIdx);

      gs.players.forEach((p, i) => {
        if (i === gs.myIdx) return;
        const pos = positions[i];
        const isActive = i === gs.currentPlayerIdx && (gs.phase === 'play' || gs.phase === 'announce');
        const isDealer = i === gs.dealerIdx;
        const initials = p.name.substring(0, 2).toUpperCase();

        const pips = Array.from({ length: 10 }, (_, j) =>
          `<div class="life-pip${j >= p.lives ? ' lost' : ''}" style="background:${p.color};"></div>`
        ).join('');

        const annTxt = p.announced !== null
          ? `${p.announced} ann · ${p.tricksWon} fait`
          : '';

        const handCount = p.hand?.length || 0;
        const miniCards = gs.oneCardSpecial && p.hand
          ? p.hand.map(c => cardHTML(c)).join('')
          : Array.from({ length: handCount }, () =>
            `<div class="mini-card-back" style="transform:rotate(${Math.random() * 6 - 3}deg);"></div>`
          ).join('');

        const seat = document.createElement('div');
        seat.className = 'player-seat';
        seat.style.cssText = `left:${pos.left}%;top:${pos.top}%;transform:translate(-50%,-50%);`;
        seat.innerHTML = `
      <div class="seat-hand-back" style="margin-bottom:4px;">${miniCards}</div>
      <div class="seat-avatar${isActive ? ' active-turn' : ''}${isDealer ? ' dealer' : ''}" style="background:${p.color};">${initials}</div>
      <div class="seat-name" style="color:${p.color};">${p.name}</div>
      <div class="seat-lives">${pips}</div>
      ${annTxt ? `<div class="seat-ann">${annTxt}</div>` : ''}
    `;
        center.appendChild(seat);
      });

      // ── Trick zone — cartes empilées avec rotation/offset ──
      // FIX: on empile les cartes au lieu de les afficher côte à côte
      const trickZone = document.getElementById('trick-zone');
      trickZone.innerHTML = '';
      if (gs.currentTrick?.length > 0) {
        // Offsets prédéfinis pour simuler un jet naturel
        const rots = [-7, 6, -4, 9, -5];
        const offsX = [-8, 10, -5, 7, -3];
        const offsY = [-3, 7, -6, 4, -8];

        gs.currentTrick.forEach((t, idx) => {
          const p = gs.players[t.playerIdx];
          const rot = rots[idx % rots.length];
          const ox = offsX[idx % offsX.length];
          const oy = offsY[idx % offsY.length];

          const wrap = document.createElement('div');
          wrap.className = 'trick-card-wrap';
          // Centré dans la zone, puis décalé + tourné
          wrap.style.cssText = `
            margin-left: calc(-1 * var(--card-w) / 2);
            margin-top:  calc(-1 * var(--card-h) / 2);
            transform: rotate(${rot}deg) translate(${ox}px, ${oy}px);
            z-index: ${idx + 1};
          `;
          wrap.innerHTML = `
            ${cardHTML(t.card)}
            <div class="trick-player-lbl" style="color:${p.color};">${p.name}</div>
          `;
          trickZone.appendChild(wrap);
        });
      }

      // ── Excuse panel ──
      const excuseWrap = document.getElementById('excuse-panel-wrap');
      if (gs.excuseWaiting && gs.excuseWaiting.playerIdx === gs.myIdx) {
        excuseWrap.innerHTML = `
      <div class="excuse-panel">
        <div class="excuse-title">⭐ L'EXCUSE — Choisissez sa valeur</div>
        <div class="excuse-btns">
          <button class="excuse-choice-btn" onclick="resolveExcuse(0)">Valeur 0<br><span style="font-size:.6rem;opacity:.6;">la plus faible</span></button>
          <button class="excuse-choice-btn" onclick="resolveExcuse(22)">Valeur 22<br><span style="font-size:.6rem;opacity:.6;">la plus forte</span></button>
        </div>
      </div>`;
      } else if (gs.excuseWaiting) {
        excuseWrap.innerHTML = `<div class="waiting-pill" style="position:static;transform:none;margin:.4rem auto;display:block;text-align:center;">⭐ ${gs.players[gs.excuseWaiting.playerIdx]?.name} choisit la valeur de l'Excuse…</div>`;
      } else {
        excuseWrap.innerHTML = '';
      }

      // ── Announce panel — redesigned ──
      // FIX: nouveaux boutons élégants avec hover animé et chiffre interdit barré
      const annPanel = document.getElementById('ann-panel');
      if (gs.phase === 'announce' && isMyAnnounceTurn) {
        const remaining = gs.players.filter(p => p.announced === null).length;
        const isLast = remaining === 1;
        const announced = gs.players.reduce((s, p) => s + (p.announced !== null ? p.announced : 0), 0);
        const forbidden = isLast ? size - announced : -1;

        const buttons = Array.from({ length: size + 1 }, (_, i) => {
          const isForbid = isLast && i === forbidden;
          return `<button
            class="ann-num-btn${isForbid ? ' forbidden-btn' : ''}"
            ${isForbid ? 'disabled' : `onclick="doAnnounce(${i})"`}
            style="${isForbid ? 'opacity:.3;cursor:not-allowed;border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.08);' : ''}">
            <span style="position:relative;z-index:1;">${i}</span>
            ${isForbid ? '<span class="forbid-x">✕</span>' : ''}
          </button>`;
        }).join('');

        annPanel.style.display = 'block';
        annPanel.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:${isLast ? '6px' : '10px'};">
            <div style="flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent);"></div>
            <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:3px;color:rgba(201,168,76,.85);white-space:nowrap;">COMBIEN DE PLIS ?</div>
            <div style="flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent);"></div>
          </div>
          ${isLast ? `<div style="font-size:.68rem;color:#e57373;text-align:center;font-style:italic;margin-bottom:8px;font-family:'Crimson Pro',serif;">⚠ Interdit : ${forbidden} (total égal au nombre de cartes)</div>` : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">${buttons}</div>
        `;
      } else {
        annPanel.style.display = 'none';
      }

      // ── Score overlay ──
      const scoreWrap = document.getElementById('score-overlay-wrap');
      if (gs.phase === 'score') {
        const rows = gs.players.map(p => {
          const diff = Math.abs((p.announced || 0) - p.tricksWon);
          const cls = diff === 0 ? 's-ok' : 's-bad';
          const txt = diff === 0 ? '✓ Exact !' : `−${diff} vie${diff > 1 ? 's' : ''}`;
          const initials = p.name.substring(0, 2).toUpperCase();
          return `<div class="score-row">
        <div class="s-avatar" style="background:${p.color};">${initials}</div>
        <div>
          <div class="s-name" style="color:${p.color};">${p.name}</div>
          <div class="s-detail">Annoncé ${p.announced} · Réalisé ${p.tricksWon}</div>
        </div>
        <div class="s-result ${cls}">${txt}</div>
      </div>`;
        }).join('');

        scoreWrap.innerHTML = `
      <div class="score-overlay">
        <div class="score-card">
          <div class="score-card-title">RÉSULTATS DE LA MANCHE</div>
          ${rows}
          <div style="margin-top:1.1rem;">
            ${isHost
            ? `<button class="btn btn-primary" onclick="doNextRound()" style="width:100%;">Manche suivante →</button>`
            : `<div style="font-size:.75rem;color:var(--cream-dim);opacity:.55;text-align:center;font-style:italic;">En attente de l'hôte…</div>`
          }
          </div>
        </div>
      </div>`;
      } else {
        scoreWrap.innerHTML = '';
      }

      // ── My hand ──
      const myHand = document.getElementById('my-hand');
      if (me.hand && me.hand.length > 0) {
        const cards = me.hand.map((c) => {
          if (c.hidden) return cardHTML(c);
          const isExcuse = c.isExcuse;
          const fn = canPlay ? `doPlayCard('${isExcuse ? 'EXCUSE' : 'T' + c.value}')` : '';
          return cardHTML(c, { clickable: canPlay, clickFn: fn });
        });
        myHand.innerHTML = cards.join('');

        // Fan effect
        const items = myHand.querySelectorAll('.tcard');
        const total = items.length;
        items.forEach((card, i) => {
          const mid = (total - 1) / 2;
          const offset = i - mid;
          const rot = offset * Math.min(6, 30 / total);
          const lift = Math.abs(offset) * 1.5;
          card.style.transform = `rotate(${rot}deg) translateY(${lift}px)`;
          card.style.zIndex = i;
          if (canPlay) {
            card.addEventListener('mouseenter', () => {
              card.style.transform = `rotate(${rot}deg) translateY(-18px) scale(1.05)`;
              card.style.zIndex = 100;
            });
            card.addEventListener('mouseleave', () => {
              card.style.transform = `rotate(${rot}deg) translateY(${lift}px)`;
              card.style.zIndex = i;
            });
          }
        });
      } else {
        myHand.innerHTML = '';
      }

      // ── Log strip ──
      const logStrip = document.getElementById('log-strip');
      if (gs.log && gs.log.length > 0) {
        logStrip.innerHTML = gs.log.slice(-5).map(l =>
          `<div class="log-line">${l}</div>`
        ).join('');
      }

      // ── Waiting pill ──
      const waitingPill = document.getElementById('waiting-pill');
      if (gs.phase === 'announce' && !isMyAnnounceTurn) {
        const annDone = gs.players.filter(p => p.announced !== null).map(p => `${p.name}: ${p.announced}`).join(' · ');
        waitingPill.textContent = annDone ? `Annoncé — ${annDone}` : '';
        waitingPill.style.display = annDone ? 'block' : 'none';
      } else {
        waitingPill.style.display = 'none';
      }
    }

    // ══════════════════════════════════════
    // End render
    // ══════════════════════════════════════
    function renderEnd(gs) {
      const winner = gs.players.reduce((b, p) => p.lives > b.lives ? p : b, gs.players[0]);
      const el = document.getElementById('end-winner');
      el.textContent = winner.name;
      el.style.color = winner.color;

      const sorted = [...gs.players].sort((a, b) => b.lives - a.lives);
      document.getElementById('end-scores').innerHTML = sorted.map((p, i) => {
        const initials = p.name.substring(0, 2).toUpperCase();
        return `<div class="score-row" style="justify-content:space-between;">
      <div class="s-avatar" style="background:${p.color};width:28px;height:28px;font-size:.7rem;">${initials}</div>
      <span style="color:${p.color};font-weight:600;flex:1;padding-left:.7rem;">${i === 0 ? '🥇 ' : ''}${p.name}</span>
      <span style="color:var(--cream-dim);font-size:.85rem;">${p.lives} vie${p.lives !== 1 ? 's' : ''}</span>
    </div>`;
      }).join('');

      document.getElementById('end-host-btns').style.display = isHost ? 'block' : 'none';
    }

    // ══════════════════════════════════════
    // Actions
    // ══════════════════════════════════════
    function doAnnounce(num) { socket.emit('announce', { num }); }
    function doPlayCard(cardId) { socket.emit('play_card', { cardId }); }
    function resolveExcuse(value) { socket.emit('resolve_excuse', { value }); }
    function doNextRound() { socket.emit('next_round'); }

    // ══════════════════════════════════════
    // UI helpers
    // ══════════════════════════════════════
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function toast(msg, ms = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), ms);
    }
  </script>
</body>

</html>
